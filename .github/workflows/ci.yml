name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: [self-hosted, node-b]
    name: Build & Test
    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private deps
        run: git config --global url."https://x-access-token:${{ secrets.GHCR_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Configure Cargo to use git CLI
        run: |
          mkdir -p ~/.cargo
          echo -e '[net]\ngit-fetch-with-cli = true' >> ~/.cargo/config.toml

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-librtbit-dht

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Compile check
        run: cargo check --workspace

      - name: Run tests
        run: cargo test --workspace --lib

      - name: Run tests (sha1-ring feature)
        run: cargo test --workspace --lib --no-default-features --features sha1-ring

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Clippy (sha1-ring feature)
        run: cargo clippy --workspace --no-default-features --features sha1-ring -- -D warnings
